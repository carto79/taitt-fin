<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Taitt Fin</title>
    <link rel="icon" href="/assets/images/taitt-fin-logo.png" type="image/png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --near-black: #111111;
            --slate: #4a4a4a;
            --dove-grey: #8a8a8a;
            --light-grey: #e8e8e8;
            --off-white: #f5f5f5;
            --white: #ffffff;
            --font-heading: 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
        }

        body {
            font-family: var(--font-body);
            color: var(--near-black);
            background: var(--off-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        .logo {
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) 0.1s forwards;
        }
        .logo img { height: 50px; width: auto; }

        .error-code {
            font-family: var(--font-heading);
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 700;
            line-height: 1;
            color: var(--light-grey);
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) 0.3s forwards;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 0.75rem;
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) 0.5s forwards;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--dove-grey);
            margin-bottom: 2.5rem;
            max-width: 440px;
            line-height: 1.7;
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) 0.7s forwards;
        }

        .actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) 0.9s forwards;
        }

        .btn-home {
            display: inline-block;
            background: var(--near-black);
            color: var(--white);
            border: 2px solid var(--near-black);
            padding: 0.9rem 2.5rem;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            transition: all 0.4s var(--ease-out);
        }
        .btn-home:hover {
            background: var(--white);
            color: var(--near-black);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .contact-link {
            color: var(--dove-grey);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .contact-link:hover { color: var(--near-black); }

        .footer-line {
            position: absolute;
            bottom: 2rem;
            color: var(--dove-grey);
            font-size: 0.8rem;
            opacity: 0;
            animation: fadeUp 0.8s var(--ease-out) 1.1s forwards;
        }

        :focus-visible { outline: 2px solid var(--near-black); outline-offset: 3px; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .logo, .error-code, h1, .subtitle, .actions, .footer-line {
                opacity: 1; animation: none; transform: none;
            }
        }
    </style>
</head>

<body>

    <a href="/" class="logo" aria-label="Return to Taitt Fin homepage">
        <img src="/assets/images/taitt-fin-logo.png" alt="Taitt Fin">
    </a>

    <div class="error-code" aria-hidden="true">404</div>

    <h1>Page Not Found</h1>

    <p class="subtitle">The page you're looking for doesn't exist or has been moved.</p>

    <div class="actions">
        <a href="/" class="btn-home">Return Home</a>
        <a href="tel:813-485-5891" class="contact-link">Or call us at 813-485-5891</a>
    </div>

    <p class="footer-line" id="copyright"></p>

    <script>
        document.getElementById('copyright').textContent =
            '© ' + new Date().getFullYear() + ' Taitt Financial. See clearly. Build boldly.';
    </script>

</body>

</html>
